services:
  # API Service
  - type: web
    name: vedameet-api
    env: python
    rootDir: backend
    buildCommand: "./render-build.sh"
    startCommand: "python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: vedameet-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: vedameet-redis
          property: connectionString
      - key: PROJECT_NAME
        value: "Vedameet API"
      - key: SECRET_KEY
        generateValue: true
      - key: JANUS_API_URL
        value: "http://your-janus-vps:8088/janus" # To be replaced by user
    autoDeploy: true

  # Redis Service
  - type: redis
    name: vedameet-redis
    ipAllowList: [] # Only allow internal connections

databases:
  - name: vedameet-db
    databaseName: vedameet
    user: vedameet
    plan: free # Use free tier for demo
